name: '✨ Feature'
description: '새로운 기능이나 제품 요구사항을 제안합니다.'
title: '[Feature]: '
labels: 'feature'
body:
  - type: textarea
    id: proposal
    attributes:
      label: 기능 설명
      description: 추가하거나 변경하려는 기능을 구체적으로 작성해 주세요.
      placeholder: 자세히 적을수록 좋습니다.
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: 작업 항목
      description: 구현해야 할 일을 최대한 세분화해서 작성해 주세요.
      placeholder: |-
        - 결과 화면 문구 설계
        - UI 구현
        - 빈 상태 처리
    validations:
      required: true
  - type: textarea
    id: etc
    attributes:
      label: 참고 자료
      description: 더 전달할 내용이나 레퍼런스가 있다면 작성해 주세요.
