  name: "🚀 신규 기능 제안"
  description: "VeriQ에 추가하고 싶은 새로운 아이디어나 개선 사항을 제안합니다."
  title: "[FEAT] "
  labels: ["enhancement"]
  body:
    - type: textarea
      id: problem
      attributes:
        label: "어떤 문제가 있나요?"
        description: "기존 기능에서 불편한 점이나, 해결하고 싶은 문제 상황을 설명해 주세요."
        placeholder:
      validations:
        required: true
    - type: textarea
      id: solution
      attributes:
        label: "어떤 기능이 추가되면 좋을까요?"
        description: "제안하시는 해결 방안이나 새로운 기능을 자세히 설명해 주세요."
        placeholder:
      validations:
        required: true
    - type: checkboxes
      id: checklist
      attributes:
        label: "작업 체크리스트"
        options:
          - label: "기존 기능에 영향을 주지 않는가?"
          - label: "BE2(분석 서버)와의 통신이 필요한가?"
          - label: "새로운 API 엔드포인트가 필요한가?"
    - type: textarea
      id: context
      attributes:
        label: "추가 정보"
        description: "스크린샷, 관련 문서 링크, 혹은 참고할만한 타 서비스 사례가 있다면 적어주세요."