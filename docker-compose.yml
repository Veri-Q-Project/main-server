version: '3.8'

services:
  # 1. MySQL 데이터베이스
  veriq-db:
    image: mysql:8.0
    container_name: veriq-db
    restart: always
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: veriq_db
      TZ: Asia/Seoul
    volumes:
      - ./mysql_data:/var/lib/mysql

  # 2. Redis 캐시 서버
  veriq-redis:
    image: redis:latest
    container_name: veriq-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      TZ: Asia/Seoul # 👈 Redis 타임존 설정

  # 3. Spring BE1 (Gateway)
  veriq-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - MAIN_CLASS=com.veriq.veriqgateway.VeriQGatewayApplication
    container_name: veriq-be1
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: be1
      SERVER_PORT: 8081
      TZ: Asia/Seoul # 👈 자바 앱 타임존 설정
      GOOGLE_RECAPTCHA_SECRET_KEY: ${GOOGLE_RECAPTCHA_SECRET_KEY}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ML_SECRET_KEY: ${ML_SECRET_KEY}
      FRONTEND_CORS_URL: http://34.64.182.89:3000
      BE3_API_URL: "http://veriq-platform:8083/api/v1/scan/upload"
    depends_on:
      - veriq-db
      - veriq-redis

  # 4. Spring BE3 (Platform/Data Hub)
  veriq-platform:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - MAIN_CLASS=com.veriq.veriqbe3.VeriQBe3Application
    container_name: veriq-be3
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: be3
      SERVER_PORT: 8083
      TZ: Asia/Seoul # 👈 자바 앱 타임존 설정
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ML_SECRET_KEY: ${ML_SECRET_KEY}
      FRONTEND_CORS_URL: http://34.64.182.89:3000
      # DB 연결 시 타임존 파라미터를 명시적으로 추가하는 것이 좋습니다.
      # 예: jdbc:mysql://veriq-db:3306/veriq_db?serverTimezone=Asia/Seoul
    depends_on:
      - veriq-db
      - veriq-redis

  # 5. FastAPI (분석 엔진)
  veriq-analysis:
    build:
      context: ../analysis-engine
      dockerfile: Dockerfile
    container_name: veriq-analysis
    restart: always
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Seoul # 👈 파이썬 분석 엔진 타임존 설정
      ML_SECRET_KEY: ${ML_SECRET_KEY}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      BE3_CALLBACK_FINAL_URL: "http://veriq-be3:8083/api/v1/scan/callback"
      BE3_CALLBACK_PROGRESS_URL: "http://veriq-be3:8083/api/v1/scan/callback/progress"
      OTX_API_KEY: ${OTX_API_KEY}
      GOOGLE_SAFE_BROWSING_API_KEY: ${GOOGLE_SAFE_BROWSING_API_KEY}
    depends_on:
      - veriq-db
