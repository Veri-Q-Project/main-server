server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://veriq-db:3306/veriq_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # DB 연결을 최대 30초까지 기다려주는 인내심 설정
    hikari:
      connection-timeout: 30000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  data:
    redis:
      host: veriq-redis
      port: 6379

ml:
  server:
    # 도커가 넘겨준 ML_SECRET_KEY 환경변수를 읽음
    secret: ${ML_SECRET_KEY}
  api :
    url: "http://veriq-analysis:8000/api/v1/scan/upload"#재조정


# 프론트엔드 허용 주소 (도커 환경변수로 덮어쓰기 가능)
frontend:
  url: ${FRONTEND_CORS_URL:http://localhost:3000}