server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://veriq-db:3306/veriq_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # DB 연결을 최대 30초까지 기다려주는 인내심 설정
    hikari:
      connection-timeout: 30000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  google:
    recaptcha:
      # 환경변수로 받거나, 일단 에러 안 나게 더미값이라도 넣어줍니다.
      secret-key: ${GOOGLE_RECAPTCHA_SECRET_KEY}
      verify-url: https://www.google.com/recaptcha/api/siteverify



  data:
    redis:
      host: veriq-redis
      port: 6379

be3:
  api:
    url: "http://veriq-be3:8083/api/v1/scan/upload"